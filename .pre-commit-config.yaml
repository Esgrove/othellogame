exclude: ^(.idea|.vscode|swift/Package.resolved)

# Run with prek (https://prek.j178.dev), a fast drop-in replacement for pre-commit.
# Hooks with the same priority run concurrently, lower priority values run first.

repos:
  - repo: builtin
    # Fast Rust implementations of pre-commit-hooks bundled with prek
    hooks:
      - id: check-added-large-files
        priority: 1
      - id: check-case-conflict
        priority: 1
      - id: check-json
        priority: 1
      - id: check-merge-conflict
        priority: 1
      - id: check-toml
        priority: 1
      - id: check-yaml
        args: [--allow-multiple-documents]
        priority: 1
      - id: end-of-file-fixer
        priority: 1
      - id: mixed-line-ending
        priority: 1
      - id: trailing-whitespace
        priority: 1

  - repo: local
    hooks:
      - id: clang-format
        name: C++ Clang-format
        description: Run clang-format on files included in the commit.
        entry: clang-format -i --style=file
        types_or: [c, c++]
        language: system
        files: ^cpp/
        priority: 1

      - id: gofmt
        name: Go format
        description: Run gofmt on files included in the commit.
        entry: sh -c 'cd go && gofmt -s -w .'
        pass_filenames: false
        types: [file, go]
        language: system
        files: ^go/
        priority: 1

      - id: golint
        name: Go lint
        description: Run golangci-lint on files included in the commit.
        entry: sh -c 'cd go && golangci-lint run'
        pass_filenames: false
        types: [file, go]
        language: system
        files: ^go/
        priority: 2

      - id: java
        name: Java format
        description: Run spotless format on files included in the commit.
        entry: sh -c 'cd java && ./gradlew spotlessApply'
        pass_filenames: false
        types: [file, java]
        language: system
        files: ^java/
        priority: 1

      - id: kotlin
        name: Kotlin format
        description: Run spotless format on files included in the commit.
        entry: sh -c 'cd kotlin && ./gradlew spotlessApply'
        pass_filenames: false
        types: [file, kotlin]
        language: system
        files: ^kotlin/
        priority: 1

      - id: dotnet
        name: C# format
        description: Run dotnet format on files included in the commit.
        entry: sh -c 'cd csharp && dotnet format'
        pass_filenames: false
        types: [file, c#]
        language: system
        files: ^csharp/
        priority: 1

      - id: python
        name: Python Ruff
        description: Run Ruff format and lint on files included in the commit.
        entry: sh -c 'cd python && uv run ruff format && uv run ruff check --fix'
        pass_filenames: false
        types: [file, python]
        language: system
        files: ^python/
        priority: 1

      - id: rust-fmt
        name: Rust format
        description: Run cargo fmt on files included in the commit.
        entry: sh -c 'cd rust && cargo fmt'
        pass_filenames: false
        types: [file, rust]
        language: system
        files: ^rust/
        priority: 1

      - id: rust-clippy
        name: Rust lint
        description: Run cargo clippy on files included in the commit.
        entry: sh -c 'cd rust && cargo clippy --fix --allow-dirty --allow-staged --all-targets -- -D warnings'
        pass_filenames: false
        types: [file, rust]
        language: system
        files: ^rust/
        priority: 2

      - id: swiftformat
        name: Swift format
        description: Run swiftformat on files included in the commit.
        entry: sh -c 'cd swift && command -v swiftformat >/dev/null 2>&1 && swiftformat --lint . || :'
        pass_filenames: false
        types: [file, swift]
        language: system
        files: ^swift/
        priority: 1

      - id: typescript-fmt
        name: TypeScript format
        description: Run oxfmt on files included in the commit.
        entry: sh -c 'cd typescript && bun format'
        pass_filenames: false
        types: [file, ts]
        language: system
        files: ^typescript/
        priority: 1

      - id: typescript-lint
        name: TypeScript lint
        description: Run oxlint on files included in the commit.
        entry: sh -c 'cd typescript && bun lint'
        pass_filenames: false
        types: [file, ts]
        language: system
        files: ^typescript/
        priority: 2
